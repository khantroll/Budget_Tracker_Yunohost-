#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;

location __PATH__/ {

  # Backend API — proxy_pass with a trailing /api/ on the target strips
  # the __PATH__ prefix, so the backend sees exactly the same paths
  # (/api/v1/...) it expects when running standalone.
  location __PATH__/api/ {
    proxy_pass http://127.0.0.1:__PORT__/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
  }

  # Frontend static SPA
  alias __INSTALL_DIR__/packages/frontend/dist/;
  index index.html;
  try_files $uri $uri/ __PATH__/index.html;

  client_max_body_size 20M;
}
